<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ことばの雨</title>
<style>
:root{
  --paper:#f8f1e4;
  --paper2:#efe1c8;
  --ink:#272019;
  --muted:#82715b;
  --thin:#d7c4a2;
  --accent:#8b4c2f;
  --gold:#b58a48;
  --soft:#fffaf0;
}
*{ box-sizing:border-box; }
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--paper);
  color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}
.app{
  width:100vw;
  height:100vh;
  display:flex;
}
.left{
  width:30%;
  min-width:300px;
  height:100%;
  padding:20px 16px;
  position:relative;
  z-index:20;
  background:
    linear-gradient(90deg, rgba(255,255,255,.55), rgba(255,255,255,.15)),
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.8), transparent 35%),
    linear-gradient(180deg, #fff8e8, #f0e2c7);
  border-right:1px solid rgba(80,50,20,.22);
  box-shadow:8px 0 24px rgba(60,40,20,.08);
  display:flex;
  flex-direction:column;
  gap:14px;
}
h1{
  margin:0 0 6px;
  font-size:30px;
  letter-spacing:.12em;
  font-weight:700;
}
.guide{
  color:var(--muted);
  font-size:13px;
  line-height:1.7;
}
.hud{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.current{
  padding:11px 13px;
  border:1px solid rgba(139,76,47,.28);
  border-radius:16px;
  background:rgba(255,255,255,.68);
  font-size:14px;
  line-height:1.6;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8), 0 6px 18px rgba(70,40,20,.05);
}
.current strong{
  color:var(--accent);
  font-size:19px;
  letter-spacing:.08em;
}
.progress{
  display:flex;
  gap:6px;
  align-items:center;
}
.dot{
  flex:1;
  height:7px;
  border-radius:999px;
  background:rgba(130,113,91,.18);
  overflow:hidden;
  position:relative;
}
.dot.done{
  background:linear-gradient(90deg, rgba(139,76,47,.75), rgba(181,138,72,.65));
}
.dot.active{
  background:rgba(181,138,72,.28);
  box-shadow:0 0 0 2px rgba(139,76,47,.12);
}
.dot.active::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.75), transparent);
  animation:shine 1.8s linear infinite;
}
@keyframes shine{
  from{ transform:translateX(-100%); }
  to{ transform:translateX(100%); }
}
.slots{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}
.slot{
  position:relative;
  min-height:76px;
  padding:10px 46px 10px 16px;
  border:1px solid var(--thin);
  border-radius:17px;
  background:rgba(255,250,240,.62);
  box-shadow:inset 0 2px 8px rgba(70,40,20,.04);
  display:flex;
  align-items:center;
  transition:.25s ease;
  overflow:hidden;
}
.slot::before{
  content:"";
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  width:3px;
  border-radius:999px;
  background:transparent;
}
.slot.active::before{
  background:linear-gradient(180deg, rgba(139,76,47,.55), rgba(181,138,72,.9));
  box-shadow:0 0 10px rgba(181,138,72,.45);
}
.slot.active{
  border-color:rgba(139,76,47,.8);
  background:rgba(255,255,250,.94);
  box-shadow:0 0 0 3px rgba(139,76,47,.12), 0 8px 22px rgba(80,50,20,.07), inset 0 2px 8px rgba(70,40,20,.04);
}
.slot.filled{
  background:rgba(255,252,245,.95);
}
.slot-label{
  position:absolute;
  right:12px;
  top:10px;
  color:var(--muted);
  font-size:13px;
}
.slot-text{
  font-size:24px;
  line-height:1.4;
  letter-spacing:.08em;
  min-height:32px;
}
.slot-hint{
  color:#b6a184;
  font-size:16px;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding-top:4px;
}
.sound-hint{
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}
.pond-hud{
  position:absolute;
  right:18px;
  top:16px;
  z-index:12;
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 12px;
  border:1px solid rgba(120,90,50,.18);
  border-radius:999px;
  background:rgba(255,250,240,.52);
  backdrop-filter:blur(6px);
  color:rgba(55,40,25,.72);
  font-size:13px;
  letter-spacing:.08em;
  pointer-events:none;
}
.pond-hud strong{
  color:var(--accent);
  font-size:15px;
}
.pond-note{
  position:absolute;
  right:18px;
  bottom:16px;
  z-index:12;
  padding:8px 11px;
  border:1px solid rgba(120,90,50,.16);
  border-radius:12px;
  background:rgba(255,250,240,.42);
  backdrop-filter:blur(6px);
  color:rgba(70,55,40,.58);
  font-size:12px;
  pointer-events:none;
}
button{
  border:1px solid var(--thin);
  background:#fff8e8;
  color:var(--ink);
  border-radius:999px;
  padding:9px 13px;
  font-family:inherit;
  font-size:14px;
  cursor:pointer;
}
button:hover{
  border-color:var(--accent);
}
button:active{
  transform:translateY(1px);
}
.toast{
  position:absolute;
  left:16px;
  bottom:74px;
  max-width:calc(100% - 32px);
  padding:9px 12px;
  border-radius:12px;
  background:rgba(50,35,20,.84);
  color:#fff7e8;
  font-size:13px;
  opacity:0;
  transform:translateY(8px);
  transition:.25s ease;
  pointer-events:none;
}
.toast.show{
  opacity:1;
  transform:translateY(0);
}
.right{
  flex:1;
  height:100%;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 70% 20%, rgba(255,255,255,.72), transparent 25%),
    radial-gradient(circle at 30% 70%, rgba(255,255,255,.35), transparent 28%),
    linear-gradient(180deg, #f4ead7, #ead9bb);
}
.right::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(120,90,50,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,90,50,.025) 1px, transparent 1px);
  background-size:44px 44px, 44px 44px;
  opacity:.55;
  pointer-events:none;
}
.right::after{
  content:"";
  position:absolute;
  inset:-15%;
  background:
    radial-gradient(circle at 20% 10%, rgba(170,120,60,.08), transparent 25%),
    radial-gradient(circle at 75% 50%, rgba(110,80,45,.06), transparent 30%);
  filter:blur(8px);
  pointer-events:none;
}
.creature{
  position:absolute;
  left:0;
  top:0;
  width:0;
  height:0;
  pointer-events:none;
  z-index:5;
}
.creature.flying-layer{
  position:fixed;
  z-index:100;
}
.char{
  position:absolute;
  left:0;
  top:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:1em;
  min-height:1em;
  color:rgba(39,32,25,.72);
  font-weight:600;
  text-shadow:0 1px 1px rgba(255,255,255,.65);
  cursor:pointer;
  pointer-events:auto;
  will-change:transform, opacity;
  padding:10px;
  margin:-10px;
  border-radius:50%;
}
.creature.valid .char{
  color:rgba(32,25,18,.94);
  text-shadow:0 0 8px rgba(181,138,72,.16), 0 1px 1px rgba(255,255,255,.8);
}
.creature.invalid .char{
  color:rgba(32,25,18,.94);
  text-shadow:0 0 8px rgba(181,138,72,.12), 0 1px 1px rgba(255,255,255,.8);
}
.creature.fleeing .char{
  color:rgba(90,58,40,.82);
}
.creature.caught .char{
  color:rgba(139,76,47,.96);
  text-shadow:0 0 12px rgba(181,138,72,.42), 0 1px 1px rgba(255,255,255,.8);
}
.clean{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:28px;
  z-index:30;
  background:rgba(248,241,228,.88);
  backdrop-filter:blur(4px);
}
.clean.show{
  display:flex;
}
.clean-card{
  width:min(560px,90%);
  min-height:420px;
  padding:36px 30px 30px;
  border:1px solid var(--thin);
  border-radius:24px;
  background:rgba(255,250,240,.94);
  box-shadow:0 18px 40px rgba(60,40,20,.18);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:18px;
}
.clean-title{
  font-size:18px;
  color:var(--muted);
  letter-spacing:.12em;
}
.clean-poem{
  writing-mode:horizontal-tb;
  text-orientation:mixed;
  width:100%;
  min-height:250px;
  font-size:27px;
  line-height:1.7;
  letter-spacing:.12em;
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  justify-content:center;
  gap:1.15em;
  padding-top:8px;
  margin-bottom:auto;
}
.clean-poem .ku{
  writing-mode:vertical-rl;
  text-orientation:upright;
  display:block;
  white-space:nowrap;
  align-self:flex-start;
}
.clean-actions{
  display:flex;
  gap:8px;
}


.ripple{
  position:fixed;
  width:14px;
  height:14px;
  border:1px solid rgba(90,70,45,.35);
  border-radius:50%;
  pointer-events:none;
  z-index:90;
  transform:translate(-50%,-50%) scale(.2);
  opacity:.75;
  animation:rippleOut .72s ease-out forwards;
}
.ripple::after{
  content:"";
  position:absolute;
  inset:-7px;
  border:1px solid rgba(90,70,45,.18);
  border-radius:50%;
}
@keyframes rippleOut{
  to{
    transform:translate(-50%,-50%) scale(3.2);
    opacity:0;
  }
}
.char.long-vowel{
  transform-origin:center center;
}

.wake{
  position:fixed;
  width:10px;
  height:10px;
  border:1px solid rgba(80,60,40,.20);
  border-radius:50%;
  pointer-events:none;
  z-index:80;
  transform:translate(-50%,-50%) scale(.2);
  opacity:.45;
  animation:wakeOut 1.15s ease-out forwards;
}
@keyframes wakeOut{
  to{
    transform:translate(-50%,-50%) scale(2.5);
    opacity:0;
  }
}
.creature.near .char{
  text-shadow:0 0 10px rgba(181,138,72,.28), 0 1px 1px rgba(255,255,255,.9);
}


/* minimal mode: remove explanatory HUD/UI from the creation screen */
.guide,
.hud,
.actions,
.sound-hint,
.pond-hud,
.pond-note{
  display:none !important;
}
.left{
  gap:10px;
}
.slots{
  justify-content:center;
}

@media (max-width:800px){
  .app{ flex-direction:column; }
  .left{
    width:100%;
    min-width:0;
    height:42%;
    padding:12px;
    border-right:none;
    border-bottom:1px solid rgba(80,50,20,.22);
  }
  h1{ font-size:22px; }
  .guide{ display:none; }
  .slots{ gap:6px; }
  .slot{
    min-height:42px;
    padding:6px 38px 6px 10px;
    border-radius:12px;
  }
  .slot-text{ font-size:18px; }
  .right{ height:58%; width:100%; flex:none; }
}
</style>
</head>
<body>
<div class="app">
  <section class="left" id="leftPanel">
    <h1>ことばの雨</h1>
    <div class="guide">右側を下から上へ泳ぎながら流れる言葉に触れて、五七五七七を作ります。今の音数と違う言葉は、震えて逃げます。</div>
    <div class="hud">
      <div class="current" id="currentGuide">次は <strong>五音</strong> の言葉をすくう</div>
      <div class="progress" id="progress"></div>
    </div>
    <div class="slots" id="slots"></div>
    <div class="actions">
      <button id="undoBtn">一語戻す</button>
      <button id="resetBtn">もう一首</button>
      <button id="copyBtn">コピー</button>
      <button id="soundBtn">音：入</button>
    </div>
    <div class="sound-hint">合う言葉は左へ泳ぎ、違う音数は震えて逃げます。言葉は下から上へ流れます。</div>
    <div class="toast" id="toast"></div>
  </section>
  <section class="right" id="pond">
    <div class="pond-hud" id="pondHud">いま <strong>五音</strong></div>
    <div class="pond-note">濃い文字をすくう。下から上へ流れる。</div>
  </section>
</div>

<div class="clean" id="clean">
  <div class="clean-card">
    <div class="clean-title">一首できました</div>
    <div class="clean-poem" id="cleanPoem"></div>
    <div class="clean-actions">
      <button id="newFromCleanBtn">もう一首</button>
      <button id="copyCleanBtn">コピー</button>
    </div>
  </div>
</div>

  function ensureAudio(){
    if(!soundOn) return null;
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      audioCtx = new AC();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(type){
    const ctx = ensureAudio();
    if(!ctx) return;
    const now = ctx.currentTime;

    const master = ctx.createGain();
    master.connect(ctx.destination);
    master.gain.setValueAtTime(0.0001, now);

    function droplet(startTime, freq, dur, gainValue){
      const g = ctx.createGain();
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.setValueAtTime(freq, startTime);
      o.frequency.exponentialRampToValueAtTime(freq * 1.55, startTime + dur * .55);
      o.frequency.exponentialRampToValueAtTime(freq * .72, startTime + dur);
      g.gain.setValueAtTime(0.0001, startTime);
      g.gain.exponentialRampToValueAtTime(gainValue, startTime + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      o.connect(g);
      g.connect(master);
      o.start(startTime);
      o.stop(startTime + dur + .02);
    }

    function filteredNoise(startTime, dur, gainValue, frequency){
      const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.7);
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(frequency, startTime);
      filter.Q.setValueAtTime(3.5, startTime);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, startTime);
      g.gain.exponentialRampToValueAtTime(gainValue, startTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      src.connect(filter);
      filter.connect(g);
      g.connect(master);
      src.start(startTime);
      src.stop(startTime + dur + .02);
    }

    if(type === "catch"){
      master.gain.exponentialRampToValueAtTime(0.55, now + 0.015);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
      filteredNoise(now, .11, .035, 950);
      droplet(now + .015, 520, .18, .055);
      droplet(now + .085, 760, .22, .038);
    }

    if(type === "flee"){
      master.gain.exponentialRampToValueAtTime(0.46, now + 0.01);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
      filteredNoise(now, .18, .045, 520);
      filteredNoise(now + .035, .14, .035, 1200);
      droplet(now + .025, 220, .16, .035);
      droplet(now + .105, 360, .12, .025);
    }

    if(type === "complete"){
      master.gain.exponentialRampToValueAtTime(0.46, now + 0.025);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 1.05);
      filteredNoise(now, .28, .025, 700);
      droplet(now + .05, 392, .34, .04);
      droplet(now + .18, 494, .38, .035);
      droplet(now + .33, 659, .46, .03);
      droplet(now + .52, 784, .38, .022);
    }
  }

  function makeSlots(){
    slotsEl.innerHTML = "";
    pattern.forEach((m, i) => {
      const slot = document.createElement("div");
      slot.className = "slot";
      slot.dataset.index = i;
      slot.innerHTML = `<div class="slot-label">${i+1}句 ${patternLabel[i]}</div><div class="slot-text"><span class="slot-hint">ここに言葉が入る</span></div>`;
      slotsEl.appendChild(slot);
    });
    updateSlots();
  }

  function updateSlots(){
    const slots = [...document.querySelectorAll(".slot")];
    slots.forEach((slot, i) => {
      slot.classList.toggle("active", i === currentIndex && currentIndex < 5);
      slot.classList.toggle("filled", !!poem[i]);
      const text = slot.querySelector(".slot-text");
      text.innerHTML = poem[i] ? poem[i] : `<span class="slot-hint">${patternLabel[i]}を待っています</span>`;
    });
    progressEl.innerHTML = pattern.map((m, i) => {
      const cls = i < currentIndex ? "dot done" : (i === currentIndex ? "dot active" : "dot");
      return `<div class="${cls}" title="${i+1}句 ${patternLabel[i]}"></div>`;
    }).join("");

    if(currentIndex < 5){
      currentGuide.innerHTML = `次は <strong>${patternLabel[currentIndex]}</strong> の言葉をすくう`;
      pondHud.innerHTML = `いま <strong>${patternLabel[currentIndex]}</strong>`;
    }else{
      currentGuide.innerHTML = `短歌が完成しました`;
      pondHud.innerHTML = `一首 <strong>完成</strong>`;
    }
    creatures.forEach(c => applyValidity(c));
  }

  function chooseWord(){
    const needed = pattern[currentIndex] || (Math.random() < .5 ? 5 : 7);
    let pool = words.slice();

    if(currentIndex < 5){
      const rolePool = words.filter(w => w.mora === needed && w.roles.includes(currentIndex));
      const sameMora = words.filter(w => w.mora === needed);
      const other = words.filter(w => w.mora !== needed);
      const r = Math.random();
      if(r < .45 && rolePool.length) pool = rolePool;
      else if(r < .91 && sameMora.length) pool = sameMora;
      else pool = other;
    }

    return pool[Math.floor(Math.random() * pool.length)];
  }

  function motionFor(word){
    const group = primaryGroup(word);
    if(group === "weird"){
      const list = ["ink","snake","ribbon"];
      return list[Math.floor(Math.random()*list.length)];
    }
    if(group === "urban"){
      const list = word.mora === 5 ? ["smallFish","fish","ribbon"] : ["ribbon","fish","bigFish"];
      return list[Math.floor(Math.random()*list.length)];
    }
    if(group === "body"){
      const list = ["ink","ribbon","fish"];
      return list[Math.floor(Math.random()*list.length)];
    }
    if(word.mora === 5){
      const list = ["smallFish","fish","ink","ribbon"];
      return list[Math.floor(Math.random()*list.length)];
    }
    const list = ["ribbon","bigFish","snake","ink"];
    return list[Math.floor(Math.random()*list.length)];
  }


  function primaryGroup(word){
    const tags = word.tags || [];
    if(tags.some(t => ["学校","細部"].includes(t))) return "school";
    if(tags.some(t => ["都市","現代","街","駅"].includes(t))) return "urban";
    if(tags.some(t => ["身体","心情"].includes(t))) return "body";
    if(tags.some(t => ["生活","物","家"].includes(t))) return "daily";
    if(tags.some(t => ["違和感","比喩"].includes(t))) return "weird";
    if(tags.some(t => ["記憶","家族","時間"].includes(t))) return "memory";
    return "water";
  }

  class Creature{
    constructor(word, startY = null){
      this.word = word;
      this.text = word.text;
      this.chars = splitText(word.text);
      this.mora = word.mora;
      this.motion = motionFor(word);
      this.group = primaryGroup(word);
      this.el = document.createElement("div");
      this.el.className = "creature";
      this.charEls = [];
      this.history = [];
      this.state = "normal";
      this.birth = performance.now();
      this.phase = Math.random() * Math.PI * 2;
      this.depth = 0.78 + Math.random() * 0.44;
      this.nearPower = 0;
      this.driftSeed = Math.random() * 1000;
      this.turnSeed = Math.random() * Math.PI * 2;
      this.tailFlex = 0.75 + Math.random() * 0.55;
      this.wakePhase = Math.random() * Math.PI * 2;

      const rect = pondRect();
      const groupLane = {
        school: 0.28,
        urban: 0.62,
        body: 0.46,
        daily: 0.38,
        weird: 0.72,
        memory: 0.54,
        water: Math.random()
      }[this.group];
      const laneX = 40 + groupLane * Math.max(120, rect.width - 100);
      this.x = laneX + (Math.random() - .5) * rect.width * .34;
      this.x = Math.max(40, Math.min(rect.width - 70, this.x));
      this.y = startY ?? (rect.height + 80 + Math.random() * rect.height * .7);
      this.vx = (Math.random() - .5) * .22;
      this.baseFall = (word.mora === 5 ? 0.126 + Math.random()*0.08 : 0.093 + Math.random()*0.06) * this.depth;
      if(this.group === "body") this.baseFall *= 0.86;
      if(this.group === "urban") this.baseFall *= 1.08;
      if(this.group === "weird") this.baseFall *= 0.72;
      if(this.group === "school") this.baseFall *= 0.96;
      this.waveSpeed = 0.0013 + Math.random() * 0.0015;
      this.waveAmp = (word.mora === 5 ? 13 + Math.random()*16 : 18 + Math.random()*24) * this.depth;
      const len = this.chars.length;
      this.spacingFrames = Math.round((word.mora === 5 ? 10 : 12) + Math.min(7, len * 0.55));
      this.baseSize = (word.mora === 5 ? 22 + Math.random()*4 : 23 + Math.random()*5) * this.depth;
      this.rotateAmp = this.motion === "snake" ? 6 : 3.6;
      this.breathSpeed = 0.00075 + Math.random() * 0.00055;
      this.fleeStart = 0;
      this.fleeDuration = 1000;
      this.fleeVX = 0;
      this.fleeVY = 0;
      this.caughtStart = 0;
      this.startPositions = [];
      this.targetPositions = [];
      this.targetSlot = null;

      this.chars.forEach((ch, i) => {
        const span = document.createElement("span");
        span.className = ch === "ー" ? "char long-vowel" : "char";
        span.textContent = ch;
        span.dataset.index = i;
        span.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          this.handleTap(e);
        });
        this.el.appendChild(span);
        this.charEls.push(span);
      });

      pond.appendChild(this.el);
      for(let i=0;i<120;i++) this.history.push({x:this.x, y:this.y + i * 4});
      applyValidity(this);
    }

    handleTap(e){
      if(this.state !== "normal") return;
      if(currentIndex >= 5) return;

      if(this.mora === pattern[currentIndex]){
        catchCreature(this);
      }else{
        fleeCreature(this, e.clientX, e.clientY);
      }
    }

    update(now, dt){
      if(this.state === "normal") this.updateNormal(now, dt);
      else if(this.state === "fleeing") this.updateFlee(now, dt);
      else if(this.state === "caught") this.updateCaught(now, dt);
    }

    updateNormal(now, dt){
      const t = now + this.phase * 1000;
      const rect = pondRect();
      let wave = Math.sin(t * this.waveSpeed) * this.waveAmp;

      if(this.motion === "snake") wave += Math.sin(t * this.waveSpeed * 2.1 + this.phase) * this.waveAmp * .30;
      if(this.motion === "ink") wave += Math.sin(t * this.waveSpeed * .42 + this.phase * 2) * this.waveAmp * .50;
      if(this.motion === "smallFish") wave += Math.sin(t * this.waveSpeed * 3.0) * 3.2;

      // 群れのゆるい中心。完全には寄せず、同じ質感の言葉が近い水域を泳ぐ程度にする。
      const groupLane = {
        school: 0.28,
        urban: 0.62,
        body: 0.46,
        daily: 0.38,
        weird: 0.72,
        memory: 0.54,
        water: 0.50
      }[this.group] ?? 0.5;
      const laneX = 40 + groupLane * Math.max(120, rect.width - 100);
      this.x += (laneX - this.x) * 0.00055 * dt;

      // 指やカーソルに近いと少し身を整え、読めるように浮き上がる。
      let nearTarget = 0;
      if(pointer.active && now - pointer.last < 1600){
        const pondR = pondRect();
        const px = pointer.x - pondR.left;
        const py = pointer.y - pondR.top;
        const dx = (this.x + wave) - px;
        const dy = this.y - py;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 150){
          nearTarget = 1 - dist / 150;
          // 触れられそうになると、ほんの少しだけ指から離れて泳ぐ
          this.x += (dx / Math.max(30, dist)) * nearTarget * 0.035 * dt;
        }
      }
      this.nearPower += (nearTarget - this.nearPower) * Math.min(1, dt * 0.008);
      this.el.classList.toggle("near", this.nearPower > .18);

      const drift = Math.sin(t * 0.00055 + this.driftSeed) * 0.018 * dt;
      this.x += this.vx * dt + Math.cos(t * this.waveSpeed + this.phase) * 0.023 * dt + drift;
      const swimPulse = 0.72 + Math.sin(t * this.breathSpeed + this.phase) * 0.18 + Math.sin(t * this.breathSpeed * 2.3) * 0.06;
      const nearSlow = 1 - this.nearPower * .18;
      this.y -= this.baseFall * Math.max(0.45, swimPulse) * nearSlow * dt;

      if(this.x < 24) { this.x = 24; this.vx = Math.abs(this.vx) + .04; }
      if(this.x > rect.width - 56) { this.x = rect.width - 56; this.vx = -Math.abs(this.vx) - .04; }

      const head = {x:this.x + wave * (1 - this.nearPower * .28), y:this.y};
      this.pushHistory(head);
      this.drawFromHistory(now, 0, 0);
    }

    updateFlee(now, dt){
      const p = Math.min(1, (now - this.fleeStart) / this.fleeDuration);
      const rect = pondRect();

      if(p < .25){
        this.pushHistory({x:this.x, y:this.y - this.baseFall * dt});
      }else{
        const q = (p - .25) / .75;
        const ease = 1 - Math.pow(1-q, 3);
        this.x += this.fleeVX * dt * (1 - ease * .45) + Math.sin(now * .018 + this.phase) * 0.035 * dt;
        this.y -= Math.max(0.04, this.baseFall - this.fleeVY * 0.18) * dt;
        if(this.x < 30){ this.x = 30; this.fleeVX = Math.abs(this.fleeVX); }
        if(this.x > rect.width - 60){ this.x = rect.width - 60; this.fleeVX = -Math.abs(this.fleeVX); }
        this.pushHistory({x:this.x, y:this.y});
      }

      const shakeStrength = p < .25 ? 7 * (1 - p / .25) : 1.2 * (1 - p);
      this.drawFromHistory(now, shakeStrength, p);

      if(p >= 1){
        this.state = "normal";
        this.el.classList.remove("fleeing");
        applyValidity(this);
      }
    }

    updateCaught(now, dt){
      const p = Math.min(1, (now - this.caughtStart) / 780);
      const ease = p < .5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
      const arc = Math.sin(p * Math.PI) * -42;

      this.charEls.forEach((span, i) => {
        const s = this.startPositions[i];
        const target = this.targetPositions[i];
        const x = s.x + (target.x - s.x) * ease;
        const y = s.y + (target.y - s.y) * ease + arc;
        const longRot = this.chars[i] === "ー" ? 90 : 0;
        const rot = longRot + Math.sin((now * .006) + i) * (1-p) * 6;
        const scale = 1.04 - p * .04;
        span.style.fontSize = `${this.baseSize + 2}px`;
        span.style.opacity = `${Math.max(0, 1 - Math.max(0, p - .76) / .24)}`;
        span.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg) scale(${scale})`;
      });

      if(p >= 1){
        this.remove();
      }
    }

    pushHistory(pos){
      this.history.unshift(pos);
      const max = this.spacingFrames * (this.chars.length + 8);
      if(this.history.length > max) this.history.length = max;
    }

    drawFromHistory(now, shake = 0, fleeP = 0){
      this.charEls.forEach((span, i) => {
        const compression = fleeP > 0 && fleeP < .28 ? 0.55 + fleeP * 1.6 : 1;
        const histIndex = Math.min(this.history.length-1, Math.round(i * this.spacingFrames * compression));
        const h = this.history[histIndex] || this.history[this.history.length-1] || {x:this.x,y:this.y};
        const t = now * 0.003;
        const readable = 1 - this.nearPower * .45;
        const wobble = Math.sin(t * 1.35 + i * .72 + this.phase) * (this.motion === "ribbon" ? 3.4 : 1.8) * readable;
        const breath = 1 + Math.sin(now * 0.0019 + i * .55 + this.phase) * (0.035 - this.nearPower * .014);
        const longRot = this.chars[i] === "ー" ? 90 : 0;
        const rot = longRot + Math.sin(now * 0.0018 + i * .72 + this.phase) * this.rotateAmp * readable;
        const sx = shake ? Math.sin(now * .08 + i * 2.4) * shake : 0;
        const sy = shake ? Math.cos(now * .075 + i * 1.8) * shake * .65 : 0;

        const baseOpacity = .96;
        const alphaWaver = this.motion === "ink" ? Math.sin(now * .0012 + i) * .07 : 0;
        const opacity = Math.max(.58, Math.min(1, baseOpacity + alphaWaver + this.nearPower * .04 - fleeP * .08));

        span.style.fontSize = `${this.baseSize * (1 + this.nearPower * .075)}px`;
        span.style.opacity = `${opacity}`;
        span.style.transform = `translate(${h.x + wobble + sx}px, ${h.y + sy}px) rotate(${rot}deg) scale(${breath})`;
      });
    }

    getCurrentPositions(){
      return this.charEls.map((span, i) => {
        const h = this.history[Math.min(this.history.length-1, i * this.spacingFrames)] || {x:this.x,y:this.y};
        return {x:h.x, y:h.y};
      });
    }

    remove(){
      this.dead = true;
      this.el.remove();
    }
  }

  function applyValidity(c){
    c.el.classList.remove("valid","invalid");
    if(currentIndex < 5 && c.mora === pattern[currentIndex]){
      c.el.classList.add("valid");
    }else{
      c.el.classList.add("invalid");
    }
  }


  function makeRipple(clientX, clientY){
    const r = document.createElement("div");
    r.className = "ripple";
    r.style.left = `${clientX}px`;
    r.style.top = `${clientY}px`;
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 780);
  }

  function fleeCreature(c, clientX, clientY){
    playTone("flee");
    makeRipple(clientX, clientY);
    const rect = pondRect();
    const localX = clientX - rect.left;
    const localY = clientY - rect.top;
    const dx = c.x - localX;
    const dir = dx >= 0 ? 1 : -1;

    c.state = "fleeing";
    c.fleeStart = performance.now();
    c.fleeVX = dir * (0.42 + Math.random()*0.28);
    c.fleeVY = 0.18 + Math.random()*0.18;
    c.el.classList.remove("valid","invalid");
    c.el.classList.add("fleeing");
    showToast(`今は${patternLabel[currentIndex]}の言葉をすくいます`);
  }

  function catchCreature(c){
    if(currentIndex >= 5) return;

    playTone("catch");

    const slotIndex = currentIndex;
    const pondR = pondRect();
    const startPositions = c.getCurrentPositions().map(pos => ({
      x: pos.x + pondR.left,
      y: pos.y + pondR.top
    }));

    const slot = document.querySelector(`.slot[data-index="${slotIndex}"]`);
    const slotRect = slot.getBoundingClientRect();
    const targetX = slotRect.left + 18;
    const targetY = slotRect.top + slotRect.height/2 - 14;
    const spacing = Math.min(28, Math.max(18, 190 / Math.max(1, c.chars.length)));
    const targetPositions = c.chars.map((_, i) => ({
      x: targetX + i * spacing,
      y: targetY
    }));

    c.state = "caught";
    c.caughtStart = performance.now();
    c.startPositions = startPositions;
    c.targetPositions = targetPositions;
    c.targetSlot = slotIndex;
    c.el.classList.remove("valid","invalid");
    c.el.classList.add("caught","flying-layer");
    document.body.appendChild(c.el);

    poem[slotIndex] = c.text;
    spawnCreature(c.mora, true);
    currentIndex++;
    spawnCreature(pattern[currentIndex] || null, true);
    updateSlots();
    ensureCreatures();

    if(currentIndex >= 5){
      playTone("complete");
      showClean();
    }
  }

  function finalizeCatch(c){
    poem[c.targetSlot] = c.text;
    c.remove();
    creatures = creatures.filter(x => x !== c);
    currentIndex++;
    updateSlots();
    ensureCreatures();
    if(currentIndex >= 5){
      playTone("complete");
      showClean();
    }
  }

  function showClean(){
    // 右から左へ、1句・2句・3句・4句・5句の5列で表示する
    const lines = poem.slice().reverse();
    cleanPoem.innerHTML = lines.map((line) => `<span class="ku">${line}</span>`).join("");
    setTimeout(() => clean.classList.add("show"), 350);
  }

  function spawnCreature(forceMora = null, immediate = false){
    let w = chooseWord();
    if(forceMora){
      const pool = words.filter(x => x.mora === forceMora);
      w = pool[Math.floor(Math.random()*pool.length)];
    }
    const rect = pondRect();
    const startY = immediate ? (rect.height + 24 + Math.random() * 80) : null;
    const c = new Creature(w, startY);
    creatures.push(c);
    return c;
  }

  function ensureCreatures(){
    const rect = pondRect();
    const desired = rect.width < 520 ? 12 : 18;
    while(creatures.filter(c => c.state !== "caught" && !c.dead).length < desired){
      spawnCreature();
    }

    if(currentIndex < 5){
      const needed = pattern[currentIndex];
      const countNeeded = creatures.filter(c => c.state === "normal" && c.mora === needed).length;
      for(let i=countNeeded; i<4; i++) spawnCreature(needed);
    }
    creatures.forEach(applyValidity);
  }

  function resetAll(){
    poem = ["","","","",""];
    currentIndex = 0;
    clean.classList.remove("show");
    creatures.forEach(c => c.remove());
    creatures = [];
    makeSlots();
    ensureCreatures();
  }

  function undo(){
    if(currentIndex <= 0) return;
    clean.classList.remove("show");
    currentIndex--;
    poem[currentIndex] = "";
    updateSlots();
    ensureCreatures();
  }

  function copyPoem(){
    const text = poem.filter(Boolean).join("\n");
    if(!text){
      showToast("まだ短歌がありません");
      return;
    }
    navigator.clipboard?.writeText(text).then(() => {
      showToast("コピーしました");
    }).catch(() => {
      showToast("コピーできませんでした");
    });
  }


  function updatePointerFromEvent(e){
    pointer.x = e.clientX;
    pointer.y = e.clientY;
    pointer.active = true;
    pointer.last = performance.now();
  }

  pond.addEventListener("pointermove", (e) => {
    updatePointerFromEvent(e);
    const now = performance.now();
    if(now - wakeTimer > 220){
      wakeTimer = now;
      makeWake(e.clientX, e.clientY);
    }
  });

  pond.addEventListener("pointerdown", (e) => {
    updatePointerFromEvent(e);
    makeWake(e.clientX, e.clientY);
  });

  pond.addEventListener("pointerleave", () => {
    pointer.active = false;
  });

  document.getElementById("resetBtn").addEventListener("click", resetAll);
  document.getElementById("undoBtn").addEventListener("click", undo);
  document.getElementById("copyBtn").addEventListener("click", copyPoem);
  document.getElementById("soundBtn").addEventListener("click", () => {
    soundOn = !soundOn;
    document.getElementById("soundBtn").textContent = soundOn ? "音：入" : "音：切";
    if(soundOn) playTone("catch");
  });
  document.getElementById("newFromCleanBtn").addEventListener("click", resetAll);
  document.getElementById("copyCleanBtn").addEventListener("click", copyPoem);

  function tick(now){
    const dt = Math.min(34, now - lastTime);
    lastTime = now;
    spawnTimer += dt;

    creatures.forEach(c => c.update(now, dt));

    const rect = pondRect();
    creatures = creatures.filter(c => {
      if(c.dead) return false;
      if(c.state !== "caught" && c.y < -180){
        c.remove();
        return false;
      }
      return true;
    });

    if(spawnTimer > 450){
      spawnTimer = 0;
      ensureCreatures();
    }

    requestAnimationFrame(tick);
  }

  makeSlots();
  ensureCreatures();
  requestAnimationFrame(tick);

  window.addEventListener("resize", () => {
    // iPadのファイルプレビューでは、タップ後のバー表示などでresizeが発生することがある。
    // ここで全削除すると、言葉の流れがリセットされたように見えるため、既存の言葉は残す。
    const rect = pondRect();
    creatures.forEach(c => {
      if(c.state === "caught") return;
      c.x = Math.max(24, Math.min(rect.width - 56, c.x));
    });
    ensureCreatures();
  });
})();
</script>
</body>
</html>
